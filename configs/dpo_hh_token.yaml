model:
  model_id: "meta-llama/Llama-3.2-1B-Instruct"
  max_length: 1024

data:
  dataset_name: "Anthropic/hh-rlhf"
  # The new token inserted right after the assistant generation-prompt header.
  # Its embedding is the only trainable parameter in the run.
  new_token: "<hh_reminder>"

training:
  beta: 0.1
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-5
  num_train_epochs: 1
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  weight_decay: 0.0
  bf16: true
  seed: 42
  logging_steps: 10
  save_steps: 200
  save_total_limit: 5
  eval_steps: 200
  max_prompt_length: 512

output:
  base_dir: "dp://dpo.base_dir"
  run_name: "dpo_hh_token"
