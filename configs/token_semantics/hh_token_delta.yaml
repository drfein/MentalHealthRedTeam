model:
  judge_model_id: meta-llama/Llama-3.2-1B-Instruct

paths:
  token_embedding_pt: "dp://dpo.hh_token_embedding"
  output_compare_txt: "dp://token_semantics.output_compare_txt"
  output_delta_txt: "dp://token_semantics.output_delta_txt"

task:
  probe_phrase: <hh_reminder>
  run_compare: true
  run_delta: true
  compare_prompt_template: |
    What does {phrase} mean?
  delta_prompt_template: |
    What does {phrase} mean?
  delta_num_samples: 100
  max_new_tokens: 200
  do_sample: true
  temperature: 0.7
