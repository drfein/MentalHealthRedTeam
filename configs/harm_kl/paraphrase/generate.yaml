# Settings for generating paraphrased versions of X.
# This is the real config for the paraphrase-generation step.
# The editable text prompt lives in prompt_template.txt.
model_name: "meta-llama/Llama-3.2-1B-Instruct"
preferences_dir: "harm_kl/data/preferences"
output_path: "harm_kl/data/paraphrase/variants.json"
prompt_template_path: "configs/harm_kl/paraphrase/prompt_template.txt"
case_id: null
overwrite: false
include_original: true
variant_count: 3
max_new_tokens: 400
temperature: 0.7

generation_system_prompt: >
  You rewrite user prompts exactly as instructed and return valid JSON only.
  Do not add commentary before or after the JSON.
